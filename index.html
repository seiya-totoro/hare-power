<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>晴れパワー送受信機</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <div class="sky-decor" aria-hidden="true">
      <span class="float-emoji sun-one">☀️</span>
      <span class="float-emoji cloud-one">☁️</span>
      <span class="float-emoji cloud-two">☁️</span>
      <span class="float-emoji sparkle-one">✨</span>
    </div>

    <section class="weather-card">
      <p class="eyebrow" id="sideLabel">2人だけの秘密URL</p>
      <h1>晴れパワー送受信機</h1>
      <p class="lead">お互いに晴れパワーを送って、届いたメッセージも見られます。</p>

      <div class="status-panel" id="connectionStatus" aria-live="polite"></div>

      <section class="power-card" id="latestPowerCard">
        <span class="power-label">相手から届いた晴れパワー</span>
        <strong id="receivedPower">まだ届いていません</strong>
        <p id="receivedFrom"></p>
      </section>

      <section class="message-card">
        <span>届いたメッセージ</span>
        <p id="receivedMessage">相手からの送信を待っています。</p>
      </section>

      <form id="sendForm" class="send-form">
        <label for="yourName">あなたの名前</label>
        <input id="yourName" name="yourName" type="text" maxlength="20" required>

        <label for="targetName">相手の名前</label>
        <input id="targetName" name="targetName" type="text" maxlength="20" required>

        <label for="powerAmount">送る晴れパワー</label>
        <div class="power-input-row">
          <input id="powerAmount" name="powerAmount" type="number" inputmode="numeric" min="1" max="9999" required>
          <span>億晴れパワー</span>
        </div>

        <label for="sendMessage">一緒に送るメッセージ</label>
        <textarea id="sendMessage" name="sendMessage" maxlength="120" required></textarea>

        <button type="submit" class="primary-button">晴れパワーを送る☀️</button>
      </form>

      <section class="mini-card">
        <h2>URLを送る</h2>
        <p class="hint">「相手用URL」をLINEやInstagram DMで送ってください。新しいURLを作ると、前のテスト履歴とは別の部屋になります。</p>
        <div class="url-stack">
          <span>あなた用URL</span>
          <div class="url-box" id="myUrl"></div>
          <span>相手用URL</span>
          <div class="url-box" id="partnerUrl"></div>
        </div>
        <div class="button-stack">
          <button type="button" class="secondary-button" id="copyPartnerUrlButton">相手用URLをコピー</button>
          <button type="button" class="secondary-button" id="newRoomButton">新しいURLを作る</button>
        </div>
      </section>

      <section class="mini-card">
        <h2>やりとり履歴</h2>
        <div class="history-list" id="historyList"></div>
        <button type="button" class="danger-button" id="clearHistoryButton">履歴を消す</button>
      </section>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
